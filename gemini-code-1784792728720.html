<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>디지털 감옥</title>
    <!-- PWA를 위한 메타 태그 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#030712">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #030712; }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.25; }
            50% { transform: scale(1.2); opacity: 0.55; }
        }
        .pulse-light {
            animation: breathe 7s infinite ease-in-out;
        }
        .segmented-ring {
            transition: stroke-dashoffset 1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-between items-center p-6 select-none overflow-hidden">

    <!-- ================= 1. 감성 시간 설정 화면 ================= -->
    <div id="setupScreen" class="w-full max-w-sm h-screen flex flex-col justify-between items-center py-10 absolute inset-0 bg-[#030712] z-20 px-6 transition-opacity duration-700">
        
        <div class="text-center pt-4">
            <span class="text-[11px] uppercase tracking-widest text-cyan-300 font-medium bg-cyan-950/60 px-4 py-1.5 rounded-full border border-cyan-800/40 shadow-sm backdrop-blur-md">
                ⏳ 디지털 디톡스 준비
            </span>
        </div>

        <div class="flex flex-col items-center justify-center space-y-8 my-auto w-full">
            <div class="absolute w-64 h-64 bg-cyan-500/10 rounded-full blur-3xl pulse-light pointer-events-none"></div>

            <div class="text-center space-y-2 z-10">
                <h2 class="text-xl font-extralight text-cyan-100 tracking-wide">몰입할 시간을 선택하세요</h2>
                <p class="text-xs text-gray-500">설정된 시간 동안 세상과 온전히 차단됩니다.</p>
            </div>

            <div class="grid grid-cols-3 gap-3 w-full z-10">
                <button onclick="setMinutes(1, this)" class="time-btn py-4 bg-gray-900/60 hover:bg-cyan-950/40 border border-cyan-500/20 text-cyan-200 rounded-2xl font-mono text-sm transition-all backdrop-blur-md shadow-lg">1분</button>
                <button onclick="setMinutes(15, this)" class="time-btn py-4 bg-gray-900/60 hover:bg-cyan-950/40 border border-cyan-500/20 text-cyan-200 rounded-2xl font-mono text-sm transition-all backdrop-blur-md shadow-lg">15분</button>
                <button onclick="setMinutes(25, this)" class="time-btn py-4 bg-cyan-950/80 border border-cyan-400 text-cyan-100 rounded-2xl font-mono text-sm transition-all backdrop-blur-md shadow-lg shadow-cyan-950/50 ring-1 ring-cyan-400/50" data-selected="true">25분</button>
                <button onclick="setMinutes(30, this)" class="time-btn py-4 bg-gray-900/60 hover:bg-cyan-950/40 border border-cyan-500/20 text-cyan-200 rounded-2xl font-mono text-sm transition-all backdrop-blur-md shadow-lg">30분</button>
                <button onclick="setMinutes(45, this)" class="time-btn py-4 bg-gray-900/60 hover:bg-cyan-950/40 border border-cyan-500/20 text-cyan-200 rounded-2xl font-mono text-sm transition-all backdrop-blur-md shadow-lg">45분</button>
                <button onclick="setMinutes(60, this)" class="time-btn py-4 bg-gray-900/60 hover:bg-cyan-950/40 border border-cyan-500/20 text-cyan-200 rounded-2xl font-mono text-sm transition-all backdrop-blur-md shadow-lg">60분</button>
            </div>

            <div class="flex items-center space-x-3 z-10 pt-2">
                <span class="text-xs text-gray-400 uppercase tracking-widest">선택된 시간 :</span>
                <span id="selectedDisplay" class="text-2xl font-extralight text-cyan-100 font-mono tracking-widest">25분</span>
            </div>
        </div>

        <div class="w-full pb-4 space-y-3 z-10">
            <button onclick="startPrison()" class="w-full py-4 bg-cyan-500 hover:bg-cyan-400 text-gray-950 font-bold rounded-2xl text-xs tracking-wider uppercase transition-all shadow-[0_0_25px_rgba(34,211,238,0.3)] flex items-center justify-center space-x-2">
                <span>🔒 감옥 입장하기</span>
            </button>
        </div>
    </div>


    <!-- ================= 2. 실제 잠금 화면 ================= -->
    <div id="lockScreen" class="w-full max-w-sm h-screen flex flex-col justify-between items-center py-8 absolute inset-0 bg-[#030712] z-10 px-6 opacity-0 pointer-events-none transition-opacity duration-700">
        
        <div class="w-full text-center pt-2">
            <span class="text-[11px] uppercase tracking-widest text-cyan-300 font-medium bg-cyan-950/60 px-4 py-1.5 rounded-full border border-cyan-800/40 shadow-sm backdrop-blur-md">
                🌌 깊은 집중의 시간
            </span>
        </div>

        <!-- 중앙 게이지 & 타이머 -->
        <div class="flex flex-col items-center justify-center space-y-6 my-auto relative">
            <div class="absolute w-72 h-72 bg-cyan-500/15 rounded-full blur-3xl pulse-light pointer-events-none"></div>
            
            <div class="relative w-56 h-56 rounded-full flex items-center justify-center bg-gray-950/40 backdrop-blur-2xl shadow-2xl border border-cyan-500/10">
                <svg class="absolute inset-0 w-full h-full p-2" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="44" stroke="#082f49" stroke-width="1.2" fill="none" stroke-dasharray="1.5 2.5" stroke-linecap="round"></circle>
                    <circle id="progressCircle" class="segmented-ring" cx="50" cy="50" r="44" stroke="#22d3ee" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="1.5 2.5" stroke-dashoffset="276.46"></circle>
                </svg>

                <div class="absolute inset-4 rounded-full border border-cyan-400/10 pointer-events-none"></div>

                <div class="text-center space-y-1 z-10">
                    <h1 id="timerText" class="text-4xl font-extralight tracking-widest text-cyan-100 font-mono">25:00</h1>
                    <p class="text-[10px] text-cyan-400/60 tracking-widest uppercase font-sans">RESTING...</p>
                </div>
            </div>

            <p class="text-xs text-gray-500 tracking-tight text-center">화면을 끄고 온전한 나만의 시간을 가져보세요.</p>
        </div>

        <!-- 하단 통화 메뉴 -->
        <div class="w-full pb-2 space-y-2">
            <div class="grid grid-cols-3 gap-2">
                <!-- 일반 전화 (즉시 실행) -->
                <button onclick="window.location.href='tel:'" class="py-3.5 bg-gray-900/80 hover:bg-emerald-950/40 border border-emerald-500/30 text-emerald-300 font-medium rounded-2xl text-xs transition-all shadow-lg flex flex-col items-center justify-center space-y-1.5 backdrop-blur-md">
                    <svg class="w-4 h-4 fill-current text-emerald-400" viewBox="0 0 100 100">
                        <path d="M27.5 15C25.5 15 23.5 16 22 17.5L14 25.5C11 28.5 11 33.5 14 38.5C18.5 46.5 25.5 53.5 33.5 58C38.5 61 43.5 61 46.5 58L54.5 50C56.5 48 57.5 46 57.5 44C57.5 42 56.5 40 54.5 38L44 27.5C42 25.5 40 24.5 38 24.5C36 24.5 34 25.5 32 27.5L29 30.5C27 29 25 27 23 25C21 23 19 21 17.5 19L20.5 16C22.5 14 23.5 12 22.5 10C21.5 8 19.5 6.5 17.5 5.5C15.5 4.5 13.5 4.5 11.5 5.5C9.5 6.5 7.5 8 6 10C3.5 13.5 2.5 17.5 3.5 22C4.5 26.5 7 31.5 11 36.5C16.5 43.5 23.5 50.5 30.5 56C35.5 60 40.5 62.5 45 63.5C49.5 64.5 53.5 63.5 57 61C59 59.5 60.5 57.5 61.5 55.5C62.5 53.5 62.5 51.5 61.5 49.5C60.5 47.5 59 45.5 57 43.5L49 35.5C47 33.5 45 32.5 43 32.5C41 32.5 39 33.5 37 35.5L34 38.5C33 39.5 31.5 39.5 30.5 38.5C28.5 36.5 26.5 34.5 24.5 32.5C22.5 30.5 20.5 28.5 19 26.5C18 25.5 18 24 19 23L22 20C23.5 18.5 24.5 16.5 24.5 14.5C24.5 12.5 23.5 10.5 22 9L27.5 15Z"/>
                    </svg>
                    <span>전화받기</span>
                </button>
                <!-- 112 신고 (커스텀 모달 호출) -->
                <button onclick="openCustomModal('112', '경찰서(112) 긴급 신고를 진행하시겠습니까?')" class="py-3.5 bg-gray-900/80 hover:bg-cyan-950/40 border border-cyan-500/30 text-cyan-200 font-medium rounded-2xl text-xs transition-all shadow-lg flex flex-col items-center justify-center space-y-1 backdrop-blur-md">
                    <span class="text-sm font-bold text-cyan-400 font-mono">🚨 112</span>
                    <span>경찰 신고</span>
                </button>
                <!-- 119 신고 (커스텀 모달 호출) -->
                <button onclick="openCustomModal('119', '소방서/구급(119) 긴급 신고를 진행하시겠습니까?')" class="py-3.5 bg-gray-900/80 hover:bg-rose-950/40 border border-rose-500/30 text-rose-300 font-medium rounded-2xl text-xs transition-all shadow-lg flex flex-col items-center justify-center space-y-1 backdrop-blur-md">
                    <span class="text-sm font-bold text-rose-400 font-mono">🚒 119</span>
                    <span>구급 신고</span>
                </button>
            </div>
        </div>
    </div>


    <!-- ================= 3. 커스텀 모달 오버레이 ================= -->
    <div id="customModal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 p-6">
        <div class="bg-gray-900 border border-cyan-500/30 rounded-3xl p-6 w-full max-w-xs shadow-[0_0_30px_rgba(34,211,238,0.15)] text-center space-y-5 transform scale-95 transition-transform duration-300" id="modalBox">
            <div class="w-12 h-12 bg-cyan-500/10 rounded-full flex items-center justify-center mx-auto border border-cyan-500/30">
                <span id="modalIcon" class="text-xl">🚨</span>
            </div>
            
            <div class="space-y-2">
                <h3 id="modalTitle" class="text-base font-bold text-cyan-100">긴급 신고 안내</h3>
                <p id="modalDesc" class="text-xs text-gray-400 leading-relaxed">선택하신 번호로 연결을 시도합니다.</p>
            </div>

            <div class="grid grid-cols-2 gap-2 pt-2">
                <button onclick="closeCustomModal()" class="py-3 bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium rounded-xl text-xs transition-all">
                    취소
                </button>
                <button id="modalConfirmBtn" class="py-3 bg-cyan-500 hover:bg-cyan-400 text-gray-950 font-bold rounded-xl text-xs transition-all shadow-[0_0_15px_rgba(34,211,238,0.3)]">
                    전화 걸기
                </button>
            </div>
        </div>
    </div>

    <script>
        // PWA 서비스 워커 등록
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('PWA Service Worker Registered'))
                .catch(err => console.log('PWA Service Worker Failed:', err));
        }

        let selectedMinutes = 25;
        let totalSeconds = 0;
        let remainingSeconds = 0;
        let timerInterval = null;
        let targetTelNumber = '';

        const circumference = 2 * Math.PI * 44;
        const circle = document.getElementById('progressCircle');
        circle.style.strokeDasharray = `1.5 2.5`;
        circle.style.strokeDashoffset = circumference;

        function setMinutes(mins, btnElement) {
            selectedMinutes = mins;
            document.getElementById('selectedDisplay').textContent = `${mins}분`;

            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.classList.remove('bg-cyan-950/80', 'border-cyan-400', 'text-cyan-100', 'ring-1', 'ring-cyan-400/50');
                btn.classList.add('bg-gray-900/60', 'border-cyan-500/20', 'text-cyan-200');
                btn.removeAttribute('data-selected');
            });

            btnElement.classList.remove('bg-gray-900/60', 'border-cyan-500/20', 'text-cyan-200');
            btnElement.classList.add('bg-cyan-950/80', 'border-cyan-400', 'text-cyan-100', 'ring-1', 'ring-cyan-400/50');
            btnElement.setAttribute('data-selected', 'true');
        }

        function startPrison() {
            totalSeconds = selectedMinutes * 60;
            remainingSeconds = totalSeconds;

            document.getElementById('setupScreen').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('lockScreen').classList.remove('opacity-0', 'pointer-events-none');

            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }

    function updateTimer() {
        let minutes = Math.floor(remainingSeconds / 60);
        let seconds = remainingSeconds % 60;
        
        document.getElementById('timerText').textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

        let elapsedTime = totalSeconds - remainingSeconds;
        let offset = circumference - (elapsedTime / totalSeconds) * circumference;
        circle.style.strokeDashoffset = offset;

        if (remainingSeconds > 0) {
            remainingSeconds--;
        } else {
            clearInterval(timerInterval);
            alert("설정된 시간이 종료되었습니다! 감옥에서 해방됩니다.");
            location.reload();
        }
    }

        function openCustomModal(type, message) {
            targetTelNumber = `tel:${type}`;
            document.getElementById('modalDesc').textContent = message;
            document.getElementById('modalIcon').textContent = type === '112' ? '🚨' : '🚒';
            
            const modal = document.getElementById('customModal');
            const box = document.getElementById('modalBox');
            
            modal.classList.remove('opacity-0', 'pointer-events-none');
            box.classList.remove('scale-95');
            box.classList.add('scale-100');
        }

        function closeCustomModal() {
            const modal = document.getElementById('customModal');
            const box = document.getElementById('modalBox');
            
            modal.classList.add('opacity-0', 'pointer-events-none');
            box.classList.remove('scale-100');
            box.classList.add('scale-95');
        }

        document.getElementById('modalConfirmBtn').addEventListener('click', function() {
            window.location.href = targetTelNumber;
        });
    </script>
</body>
</html>
