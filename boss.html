<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사장님 전용 통합 관리판</title>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
    </style>
</head>
<body class="bg-purple-50/30 min-h-screen text-gray-800" x-data="bossApp()">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative overflow-hidden">
        
        <!-- 최상위 4단 탭 네비게이션 메뉴 -->
        <div class="grid grid-cols-4 bg-purple-900 text-white font-bold text-center z-20">
            <button @click="currentTab = 'realtime'" 
                    :class="currentTab === 'realtime' ? 'bg-purple-600 border-b-4 border-yellow-400' : 'bg-purple-900 opacity-60 hover:opacity-100'"
                    class="py-3 text-[11px] transition-all">
                📋 실시간 재고
            </button>
            <button @click="currentTab = 'order'" 
                    :class="currentTab === 'order' ? 'bg-purple-600 border-b-4 border-yellow-400' : 'bg-purple-900 opacity-60 hover:opacity-100'"
                    class="py-3 text-[11px] transition-all">
                📦 입고수량
            </button>
            <button @click="currentTab = 'usage'" 
                    :class="currentTab === 'usage' ? 'bg-purple-600 border-b-4 border-yellow-400' : 'bg-purple-900 opacity-60 hover:opacity-100'"
                    class="py-3 text-[11px] transition-all">
                📊 사용량
            </button>
            <button @click="currentTab = 'missing'" 
                    :class="currentTab === 'missing' ? 'bg-purple-600 border-b-4 border-yellow-400' : 'bg-purple-900 opacity-60 hover:opacity-100'"
                    class="py-3 text-[11px] transition-all">
                💸 누락정산
            </button>
        </div>

        <!-- TAB 1: 실시간 재고 -->
        <div x-show="currentTab === 'realtime'" class="flex-1 flex flex-col">
            <div class="sticky top-0 bg-white border-b border-purple-100 z-10 px-4 py-4 flex items-center justify-between shadow-sm">
                <div>
                    <h2 class="font-bold text-base text-purple-900">📋 사장님 맞춤형 발주 리스트</h2>
                    <p class="text-xs text-purple-600 font-medium" x-text="dateLabel + ' 기준 실시간 재고'"></p>
                </div>
                <button @click="loadRealtimeData()" :disabled="loading" class="px-3 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-xl text-xs font-bold transition-all disabled:opacity-50">
                    <span x-show="!loading">새로고침</span>
                    <span x-show="loading">불러오는 중..</span>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-2 pb-10">
                <div x-show="realtimeMaterials.length === 0 && !loading" class="text-center text-gray-400 py-20 text-sm">
                    데이터가 없거나 구글 웹앱 연결을 확인해야 합니다.
                </div>
                
                <template x-for="(item, index) in realtimeMaterials" :key="index">
                    <div class="flex items-center justify-between p-3 rounded-xl border transition-all"
                         :class="item.value == 0 ? 'bg-red-50 border-red-200 shadow-sm ring-1 ring-red-300' : 'bg-white border-gray-100 shadow-2xs'">
                        <div class="flex items-center space-x-2">
                            <span class="text-[10px] px-1.5 py-0.5 rounded font-bold" 
                                  :class="item.zone === '주방' ? 'bg-orange-100 text-orange-700' : 'bg-red-100 text-red-700'" 
                                  x-text="item.zone"></span>
                            <span class="font-bold text-sm" :class="item.value == 0 ? 'text-red-700 font-extrabold' : 'text-gray-800'" x-text="item.name"></span>
                        </div>
                        <div class="text-right">
                            <span class="text-sm font-black px-3 py-1.5 rounded-lg inline-block"
                                  :class="item.value == 0 ? 'bg-red-500 text-white animate-pulse' : 'bg-gray-100 text-gray-700'"
                                  x-text="item.value + ' 개'"></span>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- TAB 2: 입고 수량 기입 -->
        <div x-show="currentTab === 'order'" class="flex-1 flex flex-col">
            <div class="sticky top-0 bg-white border-b border-purple-100 z-10 px-4 py-3 flex items-center justify-between shadow-sm">
                <div>
                    <h2 class="font-bold text-base text-purple-900">📦 입고 수량 기입</h2>
                    <p class="text-xs text-purple-600" x-text="selectedDate + ' 입고분 (월/수/금)'"></p>
                </div>
                <div class="flex items-center space-x-2">
                    <input type="date" x-model="selectedDate" @change="loadOrderData()" class="text-xs p-1.5 border border-purple-200 rounded-lg bg-purple-50">
                    <button @click="loadOrderData()" :disabled="loading" class="px-3 py-2 bg-purple-600 text-white rounded-lg text-xs font-bold">
                        새로고침
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-2 pb-20">
                <div x-show="orderMaterials.length === 0 && !loading" class="text-center text-gray-400 py-20 text-sm">
                    불러올 품목이 없습니다.
                </div>
                
                <template x-for="(item, index) in orderMaterials" :key="index">
                    <div class="flex items-center justify-between p-3 rounded-xl border bg-white border-gray-100 shadow-2xs">
                        <div class="flex items-center space-x-2">
                            <span class="text-[10px] px-1.5 py-0.5 rounded font-bold" 
                                  :class="item.zone === '주방' ? 'bg-orange-100 text-orange-700' : 'bg-red-100 text-red-700'" 
                                  x-text="item.zone"></span>
                            <span class="font-bold text-sm text-gray-800" x-text="item.name"></span>
                        </div>
                        <div class="flex items-center space-x-2">
                            <input type="number" step="any" x-model.number="item.value" placeholder="0"
                                   class="w-20 p-1.5 text-right font-bold text-sm border border-gray-300 rounded-lg focus:border-purple-600 focus:outline-none bg-gray-50">
                            <span class="text-xs text-gray-500">개</span>
                        </div>
                    </div>
                </template>
            </div>

            <div class="p-4 bg-white border-t border-gray-100 absolute bottom-0 left-0 right-0">
                <button @click="submitOrder()" :disabled="loading" class="w-full py-3 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-xl shadow-lg transition-all text-sm">
                    <span x-show="!loading">입고 수량 저장하기 (사용량 시트)</span>
                    <span x-show="loading">저장 중...</span>
                </button>
            </div>
        </div>

        <!-- TAB 3: 사용량 확인 -->
        <div x-show="currentTab === 'usage'" class="flex-1 flex flex-col bg-purple-50/50">
            <div class="sticky top-0 bg-white border-b border-purple-100 z-10 px-4 py-3 flex items-center justify-between shadow-sm">
                <div>
                    <h2 class="font-bold text-base text-purple-900">📊 주기별 사용량 리포트</h2>
                    <p class="text-[11px] text-gray-500 font-medium">최근 및 직전 주기 데이터 비교</p>
                </div>
                <button @click="loadUsageData()" :disabled="loading" class="px-3 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-xl text-xs font-bold transition-all shadow-xs">
                    🔄 새로고침
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-3 pb-10">
                <div x-show="usageMaterials.length === 0 && !loading" class="text-center text-gray-400 py-20 text-sm">
                    사용량 데이터를 불러오는 중이거나 데이터가 없습니다.
                </div>
                
                <template x-for="(item, index) in usageMaterials" :key="index">
                    <div class="p-4 rounded-2xl border bg-white border-purple-100 shadow-sm flex flex-col space-y-3 hover:shadow-md transition-all">
                        <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                            <div class="flex items-center space-x-2">
                                <span class="text-[10px] px-2 py-0.5 rounded-md font-bold" 
                                      :class="item.zone === '주방' ? 'bg-orange-100 text-orange-700' : 'bg-red-100 text-red-700'" 
                                      x-text="item.zone"></span>
                                <span class="font-bold text-base text-gray-800" x-text="item.name"></span>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-2 text-center">
                            <div class="bg-gray-50 rounded-xl p-2 flex flex-col justify-between border border-gray-100">
                                <span class="text-[11px] font-bold text-purple-900 mb-1 block">📅 토·일·월</span>
                                <div class="my-1">
                                    <span class="text-sm font-black text-gray-800" x-text="(item.satMonCurrent ?? 0) + '개'"></span>
                                </div>
                                <div class="text-[10px] text-gray-400 border-t border-dashed border-gray-200 pt-1 mt-1">
                                    직전: <span class="font-semibold text-gray-600" x-text="(item.satMonPrev ?? 0) + '개'"></span>
                                </div>
                            </div>

                            <div class="bg-gray-50 rounded-xl p-2 flex flex-col justify-between border border-gray-100">
                                <span class="text-[11px] font-bold text-purple-900 mb-1 block">📅 화·수</span>
                                <div class="my-1">
                                    <span class="text-sm font-black text-gray-800" x-text="(item.tueWedCurrent ?? 0) + '개'"></span>
                                </div>
                                <div class="text-[10px] text-gray-400 border-t border-dashed border-gray-200 pt-1 mt-1">
                                    직전: <span class="font-semibold text-gray-600" x-text="(item.tueWedPrev ?? 0) + '개'"></span>
                                </div>
                            </div>

                            <div class="bg-gray-50 rounded-xl p-2 flex flex-col justify-between border border-gray-100">
                                <span class="text-[11px] font-bold text-purple-900 mb-1 block">📅 목·금</span>
                                <div class="my-1">
                                    <span class="text-sm font-black text-gray-800" x-text="(item.thuFriCurrent ?? 0) + '개'"></span>
                                </div>
                                <div class="text-[10px] text-gray-400 border-t border-dashed border-gray-200 pt-1 mt-1">
                                    직전: <span class="font-semibold text-gray-600" x-text="(item.thuFriPrev ?? 0) + '개'"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- TAB 4: 💸 누락 정산 관리 -->
        <div x-show="currentTab === 'missing'" class="flex-1 flex flex-col bg-gray-50">
            <div class="sticky top-0 bg-white border-b border-purple-100 z-10 px-4 py-3 flex items-center justify-between shadow-sm">
                <div>
                    <h2 class="font-bold text-base text-purple-900">💸 직원 누락환불 요청 관리</h2>
                    <p class="text-[11px] text-gray-500 font-medium">직원들이 등록한 내역을 확인하고 송금하세요</p>
                </div>
                <button @click="loadMissingData()" :disabled="loading" class="px-3 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-xl text-xs font-bold transition-all shadow-xs">
                    🔄 새로고침
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-3 pb-10">
                <!-- 대기 중인 항목만 필터링하여 보여줌 ('완료'된 항목은 화면에서 즉시 숨김) -->
                <template x-for="(item, index) in missingItems.filter(i => i.status !== '완료')" :key="item.rowIndex || index">
                    <div class="bg-white rounded-2xl p-4 border border-purple-100 shadow-sm flex flex-col space-y-3">
                        <!-- 상단: 등록자 및 날짜 / 상태뱃지 -->
                        <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                            <div class="flex items-center space-x-2">
                                <span class="bg-purple-100 text-purple-800 font-bold text-xs px-2 py-0.5 rounded-md" x-text="item.staffName || '직원'"></span>
                                <span class="text-xs text-gray-400" x-text="item.timestamp"></span>
                            </div>
                            <span class="text-xs font-bold px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-700">⏳ 처리대기</span>
                        </div>

                        <!-- 중단: 정보 및 빌지 사진 -->
                        <div class="flex space-x-3 items-start">
                            <!-- 빌지 사진 미리보기 썸네일 -->
                            <div class="w-20 h-20 bg-gray-100 rounded-xl overflow-hidden border border-gray-200 shrink-0 cursor-pointer relative group"
                                 @click="openImageModal(item.imageUrl)">
                                <template x-if="item.imageUrl">
                                    <img :src="item.imageUrl" class="w-full h-full object-cover group-hover:scale-105 transition-transform" alt="빌지사진">
                                </template>
                                <template x-if="!item.imageUrl">
                                    <div class="w-full h-full flex items-center justify-center text-[10px] text-gray-400">사진없음</div>
                                </template>
                                <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-white text-[10px] font-bold">확대</div>
                            </div>

                            <!-- 상세 텍스트 정보 -->
                            <div class="flex-1 space-y-1">
                                <div class="text-xs text-gray-500">사유: <span class="text-gray-800 font-medium" x-text="item.reason"></span></div>
                                <div class="text-sm font-black text-purple-900" x-text="numberFormat(item.amount) + '원'"></div>
                                <div class="text-xs bg-gray-50 p-2 rounded-lg border border-gray-200 text-gray-700 font-mono">
                                    <span class="text-gray-400 text-[10px] block">계좌번호</span>
                                    <span class="font-bold select-all" x-text="item.bankAccount"></span>
                                </div>
                            </div>
                        </div>

                        <!-- 하단: 송금완료 버튼 -->
                        <div class="pt-1 flex justify-end">
                            <button @click="toggleStatus(item)" 
                                    class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all shadow-2xs bg-purple-600 text-white hover:bg-purple-700">
                                송금 완료 처리하기
                            </button>
                        </div>
                    </div>
                </template>

                <div x-show="missingItems.filter(i => i.status !== '완료').length === 0 && !loading" class="text-center text-gray-400 py-20 text-sm">
                    처리 대기 중인 누락 환불 요청이 없습니다. 🎉
                </div>
            </div>
        </div>

        <!-- 이미지 확대 보기 팝업 모달 -->
        <div x-show="showModal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" @click="showModal = false" x-cloak>
            <div class="relative max-w-full max-h-full">
                <img :src="modalImageUrl" class="max-w-full max-h-[85vh] rounded-2xl object-contain shadow-2xl">
                <button class="absolute -top-10 right-0 text-white font-bold text-sm bg-white/20 px-3 py-1 rounded-full">닫기 ✕</button>
            </div>
        </div>

    </div>

    <script>
        function bossApp() {
            const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzFjQ8YilzN1fegoRRt7BJS6fN-PHsVa94JbZJqV0tY7BBmlQtPneSCsLqVpc8istcxHA/exec";

            return {
                currentTab: 'realtime',
                loading: false,
                dateLabel: '',
                selectedDate: '',
                realtimeMaterials: [],
                orderMaterials: [],
                usageMaterials: [],
                missingItems: [], 
                showModal: false,
                modalImageUrl: '',

                init() {
                    const today = new Date();
                    this.selectedDate = today.toISOString().split('T')[0];
                    this.dateLabel = `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일`;
                    
                    this.loadRealtimeData();
                    this.loadOrderData();
                    this.loadUsageData();
                    this.loadMissingData();
                },

                loadRealtimeData() {
                    this.loading = true;
                    fetch(`${GOOGLE_SCRIPT_URL}?date=${this.selectedDate}`)
                    .then(res => res.json())
                    .then(res => { 
                        this.realtimeMaterials = res.data || []; 
                        this.loading = false; 
                    })
                    .catch(err => { this.loading = false; });
                },

                loadOrderData() {
                    this.loading = true;
                    fetch(`${GOOGLE_SCRIPT_URL}?date=${this.selectedDate}&type=order`)
                    .then(res => res.json())
                    .then(res => { 
                        this.orderMaterials = res.data || []; 
                        this.loading = false; 
                    })
                    .catch(err => { this.loading = false; });
                },

                submitOrder() {
                    this.loading = true;
                    const payload = {
                        date: this.selectedDate,
                        sheetType: "usage",
                        isEdit: true,
                        data: this.orderMaterials
                    };

                    fetch(GOOGLE_SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify(payload)
                    })
                    .then(res => res.json())
                    .then(res => {
                        this.loading = false;
                        if(res.status === 'success') {
                            alert("입고 수량이 '사용량' 시트에 성공적으로 저장되었습니다!");
                            this.loadUsageData();
                        } else {
                            alert("저장 실패: " + res.message);
                        }
                    })
                    .catch(err => {
                        this.loading = false;
                        alert("통신 오류: " + err);
                    });
                },

                loadUsageData() {
                    this.loading = true;
                    fetch(`${GOOGLE_SCRIPT_URL}?date=${this.selectedDate}&type=usage`)
                    .then(res => res.json())
                    .then(res => {
                        this.usageMaterials = res.data || [];
                        this.loading = false;
                    })
                    .catch(err => { this.loading = false; });
                },

                loadMissingData() {
                    this.loading = true;
                    fetch(`${GOOGLE_SCRIPT_URL}?type=missing`)
                    .then(res => res.json())
                    .then(res => {
                        this.missingItems = res.data || [];
                        this.loading = false;
                    })
                    .catch(err => { 
                        this.loading = false; 
                    });
                },

                openImageModal(url) {
                    if(!url) return;
                    this.modalImageUrl = url;
                    this.showModal = true;
                },

                // 💸 송금 완료 처리 시 화면에서 숨기고 서버(구글시트) 상태 업데이트
                toggleStatus(item) {
                    item.status = '완료'; // 화면 목록에서 즉시 숨겨지도록 상태 변경

                    const payload = {
                        sheetType: "missingUpdate",
                        rowIndex: item.rowIndex,
                        status: "완료"
                    };

                    fetch(GOOGLE_SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify(payload)
                    })
                    .then(res => res.json())
                    .then(res => {
                        if(res.status !== 'success') {
                            alert("서버 상태 반영 중 문제가 발생했습니다: " + (res.message || ''));
                        }
                    })
                    .catch(err => {
                        console.error("상태 업데이트 통신 오류:", err);
                    });
                },

                numberFormat(val) {
                    if(!val) return 0;
                    return Number(val).toLocaleString();
                }
            }
        }
    </script>
</body>
</html>
