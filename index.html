<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자재 및 재고 관리 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .date-section { margin-bottom: 20px; text-align: center; }
        .date-section input { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
        .zone-title { background: #ff9800; color: white; padding: 10px; border-radius: 6px; margin-top: 20px; font-weight: bold; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .item-name { font-size: 16px; color: #333; flex: 1; }
        .item-input { width: 100px; padding: 8px; font-size: 16px; text-align: right; border: 1px solid #ccc; border-radius: 4px; }
        .btn-submit { width: 100%; background: #28a745; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 8px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        .btn-submit:hover { background: #218838; }
        .loading { text-align: center; display: none; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 자재 및 재고 관리</h2>
    
    <div class="date-section">
        <label for="targetDate"><strong>기준 날짜:</strong></label><br><br>
        <input type="date" id="targetDate" onchange="loadDataForDate()">
    </div>

    <div id="formContainer">
        <!-- 동적으로 자재 입력 폼이 생성됩니다 -->
    </div>

    <div class="loading" id="loadingText">데이터를 불러오는 중입니다...</div>

    <button class="btn-submit" onclick="submitData()">저장하기</button>
</div>

<script>
    // 배포된 웹 앱 주소로 변경해주세요
    const WEB_APP_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL"; 

    window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('targetDate').value = today;
        loadDataForDate();
    };

    function loadDataForDate() {
        const date = document.getElementById('targetDate').value;
        document.getElementById('loadingText').style.display = "block";

        fetch(`${WEB_APP_URL}?date=${date}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('loadingText').style.display = "none";
                const container = document.getElementById('formContainer');
                container.innerHTML = "";

                if (!data.data || data.data.length === 0) {
                    container.innerHTML = "<p style='text-align:center; color:#888;'>등록된 품목이 없습니다. 시트 구성을 확인해주세요.</p>";
                    return;
                }

                let html = '<div class="zone-title">🛒 자재 입력</div>';
                data.data.forEach((item, index) => {
                    html += `
                        <div class="item-row">
                            <span class="item-name">${item.name}</span>
                            <input type="number" step="any" class="item-input" id="item_${index}" value="${item.value}" data-name="${item.name}">
                        </div>
                    `;
                });
                container.innerHTML = html;
            })
            .catch(err => {
                document.getElementById('loadingText').style.display = "none";
                alert("데이터 로드 실패: " + err);
            });
    }

    function submitData() {
        const date = document.getElementById('targetDate').value;
        if (!date) {
            alert("날짜를 선택해주세요.");
            return;
        }

        const inputs = document.querySelectorAll('.item-input');
        const items = [];

        inputs.forEach(input => {
            items.push({
                name: input.getAttribute('data-name'),
                value: input.value === "" ? 0 : Number(input.value)
            });
        });

        const payload = {
            date: date,
            data: items
        };

        document.getElementById('loadingText').innerText = "저장 중입니다...";
        document.getElementById('loadingText').style.display = "block";

        fetch(WEB_APP_URL, {
            method: "POST",
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(res => {
            document.getElementById('loadingText').style.display = "none";
            if (res.status === "success") {
                alert("성공적으로 저장되었습니다!");
            } else {
                alert("저장 실패: " + (res.message || "알 수 없는 오류"));
            }
        })
        .catch(err => {
            document.getElementById('loadingText').style.display = "none";
            alert("서버 통신 오류: " + err);
        });
    }
</script>

</body>
</html>
